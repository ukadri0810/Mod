<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MOD Premium Logo Loader</title>
<style>
:root{
  --cream:#f7f5ee;
  --purple:#5c165d;
  --gold:#fbb03b;
  --caramel:#c7782e;
  --ink:#2a102a;
}
*{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:var(--cream);color:var(--ink);overflow:hidden}.loader{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:radial-gradient(circle at 50% 38%,#fff8ed 0 18%,#f7f5ee 54%,#eee5d7 100%);animation:loaderExit 1.05s cubic-bezier(.7,0,.2,1) 5.6s forwards}.ambient{position:absolute;inset:-20%;background:radial-gradient(circle at 35% 25%,rgba(251,176,59,.28),transparent 26%),radial-gradient(circle at 70% 70%,rgba(92,22,93,.16),transparent 30%);filter:blur(22px);animation:ambientMove 5.6s ease-in-out both}.logo-wrap{position:relative;width:min(78vw,520px);aspect-ratio:468/560;transform-origin:center;animation:logoExit 1s cubic-bezier(.7,0,.2,1) 5.45s forwards}.seal{position:absolute;left:0;top:0;width:100%;height:auto;transform-origin:50% 45%;}.blob-shadow{opacity:0;transform:scale(.55);filter:blur(10px);animation:blobIn 1.05s cubic-bezier(.17,.84,.28,1) .35s forwards, breathe 3s ease-in-out 1.7s infinite}.blob{opacity:0;transform:scale(.24) rotate(-7deg);filter:drop-shadow(0 24px 38px rgba(92,22,93,.2));animation:blobIn 1.15s cubic-bezier(.17,.84,.28,1) .48s forwards, blobSettle 1.8s ease-in-out 1.6s infinite}.blob-highlight{opacity:0;transform:scale(.72);mix-blend-mode:screen;animation:highlightIn .9s ease 1.25s forwards}.letter{position:absolute;height:auto;opacity:0;filter:blur(10px);transform:translateY(20px) scale(.94);animation:letterIn .85s cubic-bezier(.16,1,.3,1) forwards}.m{width:22.8%;left:24.8%;top:32.6%;animation-delay:1.48s}.d{width:20.1%;left:57.4%;top:32.6%;animation-delay:1.68s}.ice{position:absolute;width:22.5%;left:43.6%;top:23.8%;opacity:0;filter:blur(8px);transform:translateY(-44px) scale(.92);animation:iceIn 1s cubic-bezier(.18,.92,.22,1) 1.88s forwards}.tagline{position:absolute;width:69.2%;left:15.4%;top:68.8%;opacity:0;filter:blur(8px);transform:translateY(14px);animation:tagIn .95s cubic-bezier(.16,1,.3,1) 2.55s forwards}.gloss{position:absolute;left:-38%;top:8%;width:22%;height:74%;border-radius:999px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);filter:blur(18px);transform:rotate(-24deg);opacity:0;animation:glossSweep 1.35s cubic-bezier(.4,0,.2,1) 3.45s forwards}.caption{position:absolute;left:0;right:0;bottom:2%;text-align:center;font-size:clamp(12px,2vw,15px);letter-spacing:.18em;text-transform:uppercase;color:rgba(42,16,42,.58);opacity:0;transform:translateY(8px);animation:captionIn .8s ease 3.05s forwards}.progress{position:absolute;left:24%;right:24%;bottom:-3%;height:2px;border-radius:99px;background:rgba(92,22,93,.14);overflow:hidden;opacity:0;animation:captionIn .8s ease 3.05s forwards}.progress:before{content:"";display:block;height:100%;width:0;background:linear-gradient(90deg,#5c165d,#fbb03b);animation:fill 1.65s cubic-bezier(.6,0,.2,1) 3.25s forwards}.home{min-height:100vh;display:grid;place-items:center;padding:28px;background:linear-gradient(135deg,#fffaf2,#f3eadf);opacity:0;transform:translateY(28px);animation:homeIn 1s ease 5.85s forwards}.home-card{max-width:780px;text-align:center}.home h1{font-size:clamp(44px,8vw,92px);line-height:.9;margin:0;color:#5c165d}.home p{font-size:clamp(16px,2vw,22px);line-height:1.6;color:#6d536d}.home button{border:0;border-radius:999px;padding:15px 24px;background:#5c165d;color:white;font-weight:700;box-shadow:0 14px 35px rgba(92,22,93,.22)}@keyframes ambientMove{0%{transform:translate3d(-2%,2%,0) scale(1.05)}100%{transform:translate3d(2%,-2%,0) scale(1)}}@keyframes blobIn{0%{opacity:0;transform:scale(.2) rotate(-10deg)}70%{opacity:1;transform:scale(1.035) rotate(.6deg)}100%{opacity:1;transform:scale(1) rotate(0)}}@keyframes blobSettle{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.012)}}@keyframes breathe{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.012);opacity:1}}@keyframes highlightIn{to{opacity:1;transform:scale(1)}}@keyframes letterIn{0%{opacity:0;filter:blur(12px);transform:translateY(22px) scale(.94)}100%{opacity:1;filter:blur(0);transform:translateY(0) scale(1)}}@keyframes iceIn{0%{opacity:0;filter:blur(10px);transform:translateY(-52px) scale(.9)}70%{opacity:1;filter:blur(0);transform:translateY(4px) scale(1.035)}100%{opacity:1;filter:blur(0);transform:translateY(0) scale(1)}}@keyframes tagIn{to{opacity:1;filter:blur(0);transform:translateY(0)}}@keyframes glossSweep{0%{opacity:0;left:-35%}18%{opacity:.75}100%{opacity:0;left:116%}}@keyframes captionIn{to{opacity:1;transform:translateY(0)}}@keyframes fill{to{width:100%}}@keyframes logoExit{to{transform:translateY(-34vh) scale(.42);opacity:0;filter:blur(10px)}}@keyframes loaderExit{to{opacity:0;visibility:hidden;pointer-events:none}}@keyframes homeIn{to{opacity:1;transform:translateY(0)}}@media (max-width:480px){.logo-wrap{width:90vw}.m{left:24.2%}.d{left:58%}.tagline{width:74%;left:13%;top:68.6%}.caption{bottom:0}.progress{bottom:-4%;left:18%;right:18%}}
</style>
</head>
<body>
<div class="loader" aria-label="Loading MOD website">
  <div class="ambient"></div>
  <div class="logo-wrap">
    <img class="seal blob-shadow" src="assets/blob-shadow.svg" alt="" />
    <img class="seal blob" src="assets/blob.svg" alt="" />
    <img class="seal blob-highlight" src="assets/blob-highlight.svg" alt="" />
    <img class="letter m" src="assets/m.svg" alt="M" />
    <img class="ice" src="assets/icecream-o.svg" alt="O ice cream" />
    <img class="letter d" src="assets/d.svg" alt="D" />
    <img class="tagline" src="assets/tagline.svg" alt="Moods of Desserts" />
    <div class="gloss"></div>
    <div class="caption">Crafting your dessert moment</div>
    <div class="progress"></div>
  </div>
</div>
<main class="home">
  <section class="home-card">
    <h1>Moods of Desserts</h1>
    <p>A soft, premium landing-page placeholder so the loader transitions into a real website instead of a blank screen.</p>
    <button>Explore Desserts</button>
  </section>
</main>
<script>
window.addEventListener('load',()=>{document.documentElement.classList.add('ready')});
</script>
</body>
</html>
