<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MOD | Luxury Dessert Reveal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>
  <section class="loader" id="loader" aria-label="Loading MOD website">
    <div class="grain" aria-hidden="true"></div>
    <div class="light light-a" aria-hidden="true"></div>
    <div class="light light-b" aria-hidden="true"></div>
    <div class="spotlight" aria-hidden="true"></div>

    <div class="loader-stage">
      <p class="small-title">Moods of Desserts</p>

      <div class="logo-shell" id="logoShell">
        <div class="logo-shadow" aria-hidden="true"></div>
        <div class="reveal-mask" id="revealMask">
          <img src="assets/mod-logo.png" alt="MOD Moods of Desserts" class="logo" />
          <span class="shine" id="shine" aria-hidden="true"></span>
        </div>
      </div>

      <div class="loader-copy">
        <p>Crafting your dessert moment</p>
        <div class="progress" aria-hidden="true"><span id="progressFill"></span></div>
      </div>
    </div>
  </section>

  <main class="page" id="page">
    <nav class="nav">
      <img src="assets/mod-logo.png" alt="MOD" />
      <a href="#">Instagram</a>
    </nav>

    <section class="hero">
      <p class="eyebrow">Moods of Desserts</p>
      <h1>Premium desserts for every mood.</h1>
      <p class="subtext">A warm, handcrafted dessert experience designed with soft motion and clean brand details.</p>
      <div class="cta-row">
        <a href="#">Order on Instagram</a>
        <a href="#" class="secondary">View Menu</a>
      </div>
    </section>
  </main>

  <script src="script.js?v=6"></script>
</body>
</html>
